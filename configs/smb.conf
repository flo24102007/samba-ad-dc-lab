# Global parameters
[global]
	dns forwarder = 8.8.8.8
	netbios name = DC1
	realm = ADLAB.LOCAL
	server role = active directory domain controller
	workgroup = ADLAB
	idmap_ldb:use rfc2307 = yes
        bind interfaces only = yes
        interfaces = lo ens33 ens37
[sysvol]
	path = /var/lib/samba/sysvol
	read only = No

[netlogon]
	path = /var/lib/samba/sysvol/adlab.local/scripts
	read only = No
[Partage]
   path = /srv/partage
   read only = no
   browseable = yes
   valid users = @"ADLAB\Domain Users"
